---
- name: Deploy Project 1
  hosts: webservers
  become: true

  vars:

    group_code: "01"

    repo_url: "https://github.com/AntonGruenko/kis_project_final.git"

    repo_branch: "main"

    db_password: "password123"

    nginx_port: "80{{ group_code }}"
    backend_port: "50{{ group_code }}"

    db_name: "notes_db_{{ group_code }}"
    db_user: "notes_user_{{ group_code }}"

    repo_root: "/opt/project_{{ group_code }}"

    backend_dir: "/opt/project_{{ group_code }}/backend"

    frontend_www_dir: "/var/www/project_{{ group_code }}"

    service_name: "project_{{ group_code }}-backend.service"

    nginx_conf_name: "project_{{ group_code }}.conf"

  tasks:

    - name: Clone repo
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_root }}"
        version: "{{ repo_branch }}"
        force: yes

    - name: Install requirements
      ansible.builtin.pip:
        requirements: "{{ backend_dir }}/requirements.txt"
        virtualenv: "{{ backend_dir }}/venv"
        virtualenv_command: python3 -m venv

    - name: Create frontend dir
      ansible.builtin.file:
        path: "{{ frontend_www_dir }}"
        state: directory
        mode: '0755'

    - name: Copy frontend
      ansible.builtin.copy:
        src: "{{ repo_root }}/frontend/index.html"
        dest: "{{ frontend_www_dir }}/index.html"
        remote_src: yes

    - name: Create systemd
      ansible.builtin.template:
        src: templates/project_backend.service.j2
        dest: "/etc/systemd/system/{{ service_name }}"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Start backend
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: restarted
        enabled: yes

    - name: Create nginx config
      ansible.builtin.template:
        src: templates/project_nginx.conf.j2
        dest: "/etc/nginx/sites-available/{{ nginx_conf_name }}"

    - name: Enable nginx config
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ nginx_conf_name }}"
        dest: "/etc/nginx/sites-enabled/{{ nginx_conf_name }}"
        state: link

    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
